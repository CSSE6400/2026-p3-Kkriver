services:
  app:
    build: .
    ports:
      - "6400:6400"
    environment:
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg://postgres:postgres@db:5432/todo
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
